name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint JavaScript
        # 16 legacy errors remain in card-feature, media-grid, masonry-query view.js
        # Remove continue-on-error once cleaned up
        run: npx wp-scripts lint-js src/
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "build/blocks" ]; then
            echo "::error::Build directory missing"
            exit 1
          fi
          echo "Build completed successfully"
          ls -la build/blocks/

  php-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP syntax check
        run: |
          find . -name '*.php' -not -path './vendor/*' -not -path './node_modules/*' -print0 | \
            xargs -0 -n1 php -l

  validate-blocks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate block.json files
        run: |
          errors=0
          for f in src/blocks/*/block.json; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "::error file=$f::Invalid JSON"
              errors=$((errors + 1))
            fi

            # Check required fields
            name=$(python3 -c "import json; print(json.load(open('$f')).get('name',''))")
            if [ -z "$name" ]; then
              echo "::error file=$f::Missing 'name' field"
              errors=$((errors + 1))
            fi

            # Verify namespace (goodblocks/* or agoodapp/*)
            if [[ "$name" != goodblocks/* && "$name" != agoodapp/* ]]; then
              echo "::error file=$f::Block name '$name' does not use goodblocks/ or agoodapp/ namespace"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::$errors block.json validation error(s)"
            exit 1
          fi
          echo "All block.json files valid"
