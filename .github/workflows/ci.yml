name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "build/blocks" ]; then
            echo "::error::Build directory missing"
            exit 1
          fi
          echo "Build completed successfully"
          ls -la build/blocks/
